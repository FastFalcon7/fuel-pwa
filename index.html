<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jet A-1 Uplift Calculator</title>

    <!-- iOS meta tagy -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="fuel PWA">

    <!-- iOS ikony -->
    <link rel="apple-touch-icon" href="/fuel-pwa/assets/icon-180x180.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/fuel-pwa/assets/icon-152x152.png">
    <link rel="apple-touch-icon" sizes="167x167" href="/fuel-pwa/assets/icon-167x167.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/fuel-pwa/assets/icon-180x180.png">
  
    <link rel="manifest" href="/fuel-pwa/manifest.json">
    
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 100%;
            margin: 0 auto;
            padding: 10px;
            box-sizing: border-box;
            overscroll-behavior-y: contain;
            overflow-x: hidden;
        }
        
        .container {
            display: flex;
            width: 300vw;
            transition: transform 0.3s ease;
        }
        
        .page {
            width: 100vw;
            flex-shrink: 0;
            padding: 10px;
            box-sizing: border-box;
        }
        
        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: bold;
            margin-bottom: 5px;
        }
        .input-container {
            display: flex;
            align-items: center;
            flex-wrap: nowrap;
            gap: 5px;
        }
        input, select {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        input {
            flex: 1;
            min-width: 0;
        }
        select {
            width: auto;
            min-width: 80px;
        }
        .unit {
            color: #0066cc;
            min-width: 45px;
            margin-right: 5px;
        }
        #requiredUpliftGroup {
            background-color: #ffe4d1;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
        }
        #requiredUpliftGroup .input-container {
            margin-top: 5px;
            display: grid;
            grid-template-columns: 1fr auto 1fr auto;
            gap: 5px;
            align-items: center;
        }
        
        /* Štýly pre novú stránku */
        #requiredFuelGroup90 {
            background-color: #e4f1ff;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        /* Štýly pre checklist */
        .checklist-item {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            user-select: none;
        }

        .checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid #FF8C00;
            border-radius: 4px;
            margin-right: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .checklist-item.checked .checkbox {
            background-color: #4CAF50;
            border-color: #4CAF50;
        }

        .checkbox::after {
            content: '✓';
            color: white;
            font-size: 14px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .checklist-item.checked .checkbox::after {
            opacity: 1;
        }

        .checklist-item label {
            color: #FF8C00;
            font-weight: 600;
            font-size: 17px;
            margin-bottom: 0;
            cursor: pointer;
            transition: color 0.3s ease;
            flex: 1;
        }

        .checklist-item.checked label {
            color: #4CAF50;
        }
        
        h1 {
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #0066cc;
        }
        @media (min-width: 600px) {
            body {
                padding: 20px;
            }
            .page {
                max-width: 600px;
                margin: 0 auto;
            }
            .form-group {
                flex-direction: row;
                align-items: center;
            }
            label {
                flex: 0 0 200px;
                margin-bottom: 0;
            }
            .input-container {
                flex: 1;
            }
        }
        .clear-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #35c94e;
            color: white;
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 1000;
            cursor: pointer;
        }
        
        /* Page indicator */
        .page-indicator {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 1000;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #ccc;
            transition: background-color 0.3s;
        }
        .dot.active {
            background-color: #0066cc;
        }
        
        /* Štýly pre pull-to-refresh */
        .pull-indicator {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f0f0f0;
            transform: translateY(-100%);
            transition: transform 0.2s;
        }

        #versionInfo {
            position: fixed;
            bottom: 20px;
            left: 20px;
            font-size: 11px;
            color: #999;
            z-index: 999;
            cursor: pointer;
            padding: 5px 10px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 5px;
            user-select: none;
        }

        #versionInfo:hover {
            color: #0066cc;
            background: rgba(255, 255, 255, 1);
        }

        #statusBox {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border: 2px solid #0066cc;
            border-radius: 10px;
            padding: 20px;
            z-index: 10000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            max-width: 90%;
            display: none;
            font-size: 14px;
        }

        #statusBox.show {
            display: block;
        }

        #statusBox h3 {
            margin: 0 0 15px 0;
            color: #0066cc;
            font-size: 16px;
        }

        #statusBox p {
            margin: 8px 0;
            line-height: 1.5;
        }

        #statusBox .status-ok {
            color: #28a745;
            font-weight: bold;
        }

        #statusBox .status-error {
            color: #dc3545;
            font-weight: bold;
        }

        #statusBox button {
            margin-top: 15px;
            padding: 10px 20px;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="pull-indicator">Pull to refresh</div>
    <div id="versionInfo" title="Klikni pre zobrazenie PWA statusu">v0.82 📊</div>

    <!-- Status Box for PWA info -->
    <div id="statusBox">
        <h3>PWA Status</h3>
        <div id="statusContent">Click on version to check status</div>
        <button id="statusBoxCloseBtn">OK</button>
    </div>

    <div class="container" id="container">
        <!-- Prvá stránka - pôvodný calculator -->
        <div class="page" id="page1">
            <h1>Jet A-1 Uplift Calculator</h1>
            <div id="calculator">
                <div class="form-group">
                    <label for="remainingFuel">Remaining Fuel:</label>
                    <div class="input-container">
                        <input type="text" inputmode="decimal" id="remainingFuel">
                        <span class="unit">lbs</span>
                    </div>
                </div>
                <div class="form-group">
                    <label for="requiredFuel">Required Fuel:</label>
                    <div class="input-container">
                        <input type="text" inputmode="decimal" id="requiredFuel">
                        <span class="unit">lbs</span>
                    </div>
                </div>
                <div class="form-group">
                    <label for="fuelDensity">Fuel Density:</label>
                    <div class="input-container">
                        <input type="text" inputmode="decimal" id="fuelDensity" value="0.7900">
                        <span class="unit">kg/l</span>
                    </div>
                </div>
                <div class="form-group">
                    <label for="fuelTemperature">Fuel Temperature:</label>
                    <div class="input-container">
                        <input type="text" inputmode="decimal" id="fuelTemperature">
                        <span class="unit">°C</span>
                    </div>
                </div>
                <div id="requiredUpliftGroup">
                    <label for="requiredUpliftLbs">Required Uplift:</label>
                    <div class="input-container">
                        <input type="text" inputmode="decimal" id="requiredUpliftLbs">
                        <span class="unit">lbs</span>
                        <input type="text" inputmode="decimal" id="requiredUpliftConverted" readonly>
                        <select id="upliftUnit">
                            <option value="L">liters</option>
                            <option value="USG">USgal</option>
                            <option value="LBS">lbs</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="actualUplift">Actual Uplift:</label>
                    <div class="input-container">
                        <input type="text" inputmode="decimal" id="actualUplift">
                        <span class="unit" id="actualUpliftUnit">liters</span>
                    </div>
                </div>
                <div class="form-group">
                    <label for="totalActualFuel">Total Actual Fuel:</label>
                    <div class="input-container">
                        <input type="text" inputmode="decimal" id="totalActualFuel" readonly>
                        <span class="unit">lbs</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Druhá stránka - "90%" calculator -->
        <div class="page" id="page2">
            <h1>"90%" Uplift Calculator</h1>
            <div id="calculator90">
                <div class="form-group">
                    <label for="remainingFuel90">Remaining Fuel:</label>
                    <div class="input-container">
                        <input type="text" inputmode="decimal" id="remainingFuel90">
                        <span class="unit">lbs</span>
                    </div>
                </div>
                <div class="form-group">
                    <label for="tripTaxiFuel">Trip+Taxi Fuel:</label>
                    <div class="input-container">
                        <input type="text" inputmode="decimal" id="tripTaxiFuel">
                        <span class="unit">lbs</span>
                    </div>
                </div>
                <div id="requiredFuelGroup90">
                    <label for="requiredFuel90">Required Fuel:</label>
                    <div class="input-container">
                        <input type="text" inputmode="decimal" id="requiredFuel90" readonly>
                        <span class="unit">lbs</span>
                    </div>
                </div>
                <div class="form-group">
                    <label for="onBlockFuel">On Block Fuel:</label>
                    <div class="input-container">
                        <input type="text" inputmode="decimal" id="onBlockFuel" readonly>
                        <span class="unit">lbs</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tretia stránka - Parking checklist -->
        <div class="page" id="page3">
            <h1>Parking Checklist</h1>
            <div id="parkingChecklist">
                <div class="checklist-item" data-item="sun-shields">
                    <div class="checkbox"></div>
                    <label>Sun shields</label>
                </div>
                <div class="checklist-item" data-item="chocks">
                    <div class="checkbox"></div>
                    <label>Chocks</label>
                </div>
                <div class="checklist-item" data-item="brake-off">
                    <div class="checkbox"></div>
                    <label>Brake OFF</label>
                </div>
                <div class="checklist-item" data-item="gear-rat-pins">
                    <div class="checkbox"></div>
                    <label>Gear/RAT pins</label>
                </div>
                <div class="checklist-item" data-item="probes-covers">
                    <div class="checkbox"></div>
                    <label>Probes covers</label>
                </div>
                <div class="checklist-item" data-item="nlg-disconnect">
                    <div class="checkbox"></div>
                    <label>NLG disconnect</label>
                </div>
                <div class="checklist-item" data-item="toilet-service">
                    <div class="checkbox"></div>
                    <label>Toilet service</label>
                </div>
                <div class="checklist-item" data-item="water-drain">
                    <div class="checkbox"></div>
                    <label>Water drain</label>
                </div>
                <div class="checklist-item" data-item="fuel-spillage">
                    <div class="checkbox"></div>
                    <label>Fuel spillage</label>
                </div>
                <div class="checklist-item" data-item="engine-apu-covers">
                    <div class="checkbox"></div>
                    <label>Engine/APU covers</label>
                </div>
                <div class="checklist-item" data-item="batteries">
                    <div class="checkbox"></div>
                    <label>Batteries</label>
                </div>
            </div>
        </div>
    </div>

    <!-- Page indicator -->
    <div class="page-indicator">
        <div class="dot active" id="dot1"></div>
        <div class="dot" id="dot2"></div>
        <div class="dot" id="dot3"></div>
    </div>

    <button class="clear-button" id="clearButton">CLR</button>

    <script>
    window.onload = function() {
        const elements = {
            // Prvá stránka
            remainingFuel: document.getElementById('remainingFuel'),
            requiredFuel: document.getElementById('requiredFuel'),
            fuelDensity: document.getElementById('fuelDensity'),
            fuelTemperature: document.getElementById('fuelTemperature'),
            requiredUpliftLbs: document.getElementById('requiredUpliftLbs'),
            requiredUpliftConverted: document.getElementById('requiredUpliftConverted'),
            upliftUnit: document.getElementById('upliftUnit'),
            actualUplift: document.getElementById('actualUplift'),
            actualUpliftUnit: document.getElementById('actualUpliftUnit'),
            totalActualFuel: document.getElementById('totalActualFuel'),
            
            // Druhá stránka
            remainingFuel90: document.getElementById('remainingFuel90'),
            tripTaxiFuel: document.getElementById('tripTaxiFuel'),
            requiredFuel90: document.getElementById('requiredFuel90'),
            onBlockFuel: document.getElementById('onBlockFuel')
        };

        let currentPage = 0;
        let lastActualUpliftLbs = 0;

        const container = document.getElementById('container');
        const dot1 = document.getElementById('dot1');
        const dot2 = document.getElementById('dot2');
        const dot3 = document.getElementById('dot3');

        // Swipe functionality
        let startX = 0;
        let startY = 0;
        let isScrolling = false;

        document.addEventListener('touchstart', function(e) {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
            isScrolling = undefined;
        }, { passive: true });

        document.addEventListener('touchmove', function(e) {
            if (isScrolling === true) return;
            
            const currentX = e.touches[0].clientX;
            const currentY = e.touches[0].clientY;
            const diffX = startX - currentX;
            const diffY = startY - currentY;
            
            if (isScrolling === undefined) {
                isScrolling = Math.abs(diffY) > Math.abs(diffX);
            }
            
            if (!isScrolling && Math.abs(diffX) > 10) {
                e.preventDefault();
            }
        }, { passive: false });

        document.addEventListener('touchend', function(e) {
            if (isScrolling) return;

            const endX = e.changedTouches[0].clientX;
            const diffX = startX - endX;

            if (Math.abs(diffX) > 50) {
                if (diffX > 0) {
                    // Swipe left - ďalšia stránka
                    if (currentPage < 2) {
                        currentPage++;
                        updatePagePosition();
                    }
                } else if (diffX < 0) {
                    // Swipe right - predošlá stránka
                    if (currentPage > 0) {
                        currentPage--;
                        updatePagePosition();
                    }
                }
            }
        }, { passive: true });

        function updatePagePosition() {
            container.style.transform = `translateX(-${currentPage * 100}vw)`;
            dot1.classList.toggle('active', currentPage === 0);
            dot2.classList.toggle('active', currentPage === 1);
            dot3.classList.toggle('active', currentPage === 2);
        }

        // Funkcie pre 90% calculator
        function calculate90Percent() {
            const remainingFuel90 = parseFloat(elements.remainingFuel90.value) || 0;
            const tripTaxiFuel = parseFloat(elements.tripTaxiFuel.value) || 0;
            
            // Required Fuel = Remaining Fuel + 90% of Trip+Taxi Fuel
            const requiredFuel90 = remainingFuel90 + (tripTaxiFuel * 0.9);
            elements.requiredFuel90.value = Math.round(requiredFuel90);
            
            // On Block Fuel = Required Fuel - Trip+Taxi Fuel
            const onBlockFuel = requiredFuel90 - tripTaxiFuel;
            elements.onBlockFuel.value = Math.round(onBlockFuel);
        }

        // Event listeners pre 90% calculator
        elements.tripTaxiFuel.addEventListener('input', calculate90Percent);

        // Synchronizácia iba medzi Remaining Fuel poliami
        elements.remainingFuel.addEventListener('input', function() {
            elements.remainingFuel90.value = this.value;
            updateCalculations();
        });

        elements.remainingFuel90.addEventListener('input', function() {
            elements.remainingFuel.value = this.value;
            calculate90Percent();
            updateCalculations();
        });

        // Funkcia na vymazanie formulára
        function clearForm() {
            // Prvá stránka
            elements.remainingFuel.value = '';
            elements.requiredFuel.value = '';
            elements.fuelDensity.value = '0.7900';
            elements.fuelTemperature.value = '15';
            elements.requiredUpliftLbs.value = '';
            elements.requiredUpliftConverted.value = '';
            elements.actualUplift.value = '';
            elements.totalActualFuel.value = '';

            // Druhá stránka
            elements.remainingFuel90.value = '';
            elements.tripTaxiFuel.value = '';
            elements.requiredFuel90.value = '';
            elements.onBlockFuel.value = '';

            // Resetovanie checklistu
            const checklistItems = document.querySelectorAll('.checklist-item');
            checklistItems.forEach(item => {
                item.classList.remove('checked');
            });
            localStorage.removeItem('parkingChecklistState');
            localStorage.removeItem('fuelCalculatorFormState');

            lastActualUpliftLbs = 0;
            updateCalculations();
        }

        // Offline event listenery
        window.addEventListener('offline', function() {
            console.log('Aplikácia je offline');
        });

        window.addEventListener('online', function() {
            console.log('Aplikácia je online');
            if (navigator.serviceWorker.controller) {
                navigator.serviceWorker.controller.postMessage({
                    type: 'UPDATE_CACHE'
                });
            }
        });

        function calculateDensity(temperature) {
            return 0.79 + (15 - temperature) * 0.0007;
        }

        function calculateTemperature(density) {
            return 15 + ((0.79 - density) / 0.0007);
        }

        function convertToLiters(value, fromUnit) {
            if (fromUnit === 'USG') return value * 3.78541;
            if (fromUnit === 'LBS') {
                const density = parseFloat(elements.fuelDensity.value) || 0.79;
                return value / (density * 2.20462);
            }
            return value;
        }

        function convertFromLiters(liters, toUnit) {
            if (toUnit === 'USG') return liters / 3.78541;
            if (toUnit === 'LBS') {
                const density = parseFloat(elements.fuelDensity.value) || 0.79;
                return liters * density * 2.20462;
            }
            return liters;
        }

        function convertValue(value, fromUnit, toUnit) {
            if (fromUnit === toUnit) return value;
            const liters = convertToLiters(value, fromUnit);
            return convertFromLiters(liters, toUnit);
        }

        // Helper funkcia na získanie aktuálnej jednotky pre Actual Uplift (z Required Uplift dropdown)
        function getActualUpliftUnit() {
            return elements.upliftUnit.value;
        }

        // Helper funkcia na aktualizáciu textu jednotiek v Actual Uplift spane
        function updateActualUpliftUnitText() {
            const unit = getActualUpliftUnit();
            const unitTexts = {
                'L': 'liters',
                'USG': 'USgal',
                'LBS': 'lbs'
            };
            elements.actualUpliftUnit.textContent = unitTexts[unit] || 'liters';
        }

        function updateActualUpliftDisplay() {
            const currentUnit = getActualUpliftUnit();
            const currentValue = parseFloat(elements.actualUplift.value) || 0;
            const currentValueInLbs = convertValue(currentValue, currentUnit, 'LBS');
            lastActualUpliftLbs = currentValueInLbs;
        }

        function convertActualUpliftToNewUnit(newUnit) {
            if (!elements.actualUplift.value) return;
            const newValue = convertValue(lastActualUpliftLbs, 'LBS', newUnit);
            elements.actualUplift.value = Math.round(newValue);
        }

        function updateCalculations(sourceField) {
            const density = parseFloat(elements.fuelDensity.value) || 0.79;
            const remainingFuelLbs = parseFloat(elements.remainingFuel.value) || 0;
            const requiredFuelLbs = parseFloat(elements.requiredFuel.value) || 0;
            let upliftLbs = parseFloat(elements.requiredUpliftLbs.value) || 0;

            // Keď užívateľ edituje requiredFuel, prepočítaj iba uplift (NEPREPISUJ requiredFuel)
            if (sourceField === 'requiredFuel') {
                if (remainingFuelLbs && requiredFuelLbs) {
                    upliftLbs = requiredFuelLbs - remainingFuelLbs;
                    elements.requiredUpliftLbs.value = Math.round(upliftLbs);
                }
            }
            // Keď užívateľ edituje requiredUpliftLbs, prepočítaj requiredFuel
            else if (sourceField === 'requiredUpliftLbs') {
                if (upliftLbs) {
                    elements.requiredFuel.value = Math.round(remainingFuelLbs + upliftLbs);
                }
            }
            // Pre ostatné polia (density, temperature, remainingFuel) použij pôvodnú logiku
            else {
                if (remainingFuelLbs && requiredFuelLbs) {
                    upliftLbs = requiredFuelLbs - remainingFuelLbs;
                    elements.requiredUpliftLbs.value = Math.round(upliftLbs);
                } else if (upliftLbs) {
                    elements.requiredFuel.value = Math.round(remainingFuelLbs + upliftLbs);
                }
            }

            elements.requiredUpliftConverted.value = Math.round(
                convertValue(upliftLbs, 'LBS', elements.upliftUnit.value)
            );

            elements.totalActualFuel.value = Math.round((remainingFuelLbs + lastActualUpliftLbs) / 10) * 10;
        }

        // Event listeners pre existujúce funkcie
        elements.actualUplift.addEventListener('input', function() {
            updateActualUpliftDisplay();
            updateCalculations();
        });

        // Pridané event listenery pre Required Fuel a Required Uplift
        elements.requiredFuel.addEventListener('input', function() {
            updateCalculations('requiredFuel');
        });

        elements.requiredUpliftLbs.addEventListener('input', function() {
            updateCalculations('requiredUpliftLbs');
        });

        // Keď sa zmení jednotka v Required Uplift, aktualizuj aj Actual Uplift
        elements.upliftUnit.addEventListener('change', function() {
            const selectedUnit = this.value;
            // Aktualizuj text jednotiek v Actual Uplift spane
            updateActualUpliftUnitText();
            // Prepočítaj hodnotu v Actual Uplift na novú jednotku
            convertActualUpliftToNewUnit(selectedUnit);
            updateCalculations();
        });

        elements.fuelDensity.addEventListener('input', function() {
            const density = parseFloat(this.value);
            if (!isNaN(density)) {
                elements.fuelTemperature.value = Math.round(calculateTemperature(density));
            }
            if (elements.actualUplift.value) {
                updateActualUpliftDisplay();
                convertActualUpliftToNewUnit(getActualUpliftUnit());
            }
            updateCalculations();
        });

        elements.fuelTemperature.addEventListener('input', function() {
            const temperature = parseFloat(this.value);
            if (!isNaN(temperature)) {
                elements.fuelDensity.value = calculateDensity(temperature).toFixed(4);
            }
            if (elements.actualUplift.value) {
                updateActualUpliftDisplay();
                convertActualUpliftToNewUnit(getActualUpliftUnit());
            }
            updateCalculations();
        });

        // Parking checklist functionality
        const checklistItems = document.querySelectorAll('.checklist-item');
        const CHECKLIST_STORAGE_KEY = 'parkingChecklistState';

        // Načítanie stavu checklistu z localStorage
        function loadChecklistState() {
            try {
                const savedState = localStorage.getItem(CHECKLIST_STORAGE_KEY);
                if (!savedState) return;

                const state = JSON.parse(savedState);

                // Validate state structure
                if (typeof state !== 'object' || state === null) {
                    console.warn('Invalid checklist state, clearing...');
                    localStorage.removeItem(CHECKLIST_STORAGE_KEY);
                    return;
                }

                checklistItems.forEach(item => {
                    const itemKey = item.getAttribute('data-item');
                    if (itemKey && state[itemKey] === true) {
                        item.classList.add('checked');
                    }
                });
            } catch (error) {
                console.error('Failed to load checklist state:', error);
                localStorage.removeItem(CHECKLIST_STORAGE_KEY);
            }
        }

        // Uloženie stavu checklistu do localStorage
        function saveChecklistState() {
            const state = {};
            checklistItems.forEach(item => {
                const itemKey = item.getAttribute('data-item');
                state[itemKey] = item.classList.contains('checked');
            });
            localStorage.setItem(CHECKLIST_STORAGE_KEY, JSON.stringify(state));
        }

        // Toggle checkbox
        checklistItems.forEach(item => {
            item.addEventListener('click', function() {
                this.classList.toggle('checked');
                saveChecklistState();
            });
        });

        // Načítanie uloženého stavu pri načítaní stránky
        loadChecklistState();

        // Form values persistence
        const FORM_STORAGE_KEY = 'fuelCalculatorFormState';
        const inputFields = [
            'remainingFuel', 'requiredFuel', 'fuelDensity', 'fuelTemperature',
            'requiredUpliftLbs', 'actualUplift', 'remainingFuel90', 'tripTaxiFuel'
        ];

        // Load saved form values with validation
        function loadFormState() {
            try {
                const savedState = localStorage.getItem(FORM_STORAGE_KEY);
                if (!savedState) return;

                const state = JSON.parse(savedState);

                // Validate that state is an object
                if (typeof state !== 'object' || state === null) {
                    console.warn('Invalid form state in localStorage, clearing...');
                    localStorage.removeItem(FORM_STORAGE_KEY);
                    return;
                }

                inputFields.forEach(fieldId => {
                    const element = document.getElementById(fieldId);
                    if (element && state[fieldId] !== undefined && state[fieldId] !== '') {
                        // Validate that value is a valid number string
                        const value = String(state[fieldId]);

                        // Allow negative, decimal, and positive numbers
                        if (!/^-?\d*\.?\d+$/.test(value) && value !== '') {
                            console.warn(`Invalid value for ${fieldId}, skipping`);
                            return;
                        }

                        element.value = value;
                    }
                });

                // Trigger calculations after loading
                updateCalculations();
                calculate90Percent();
            } catch (error) {
                console.error('Failed to load form state:', error);
                localStorage.removeItem(FORM_STORAGE_KEY);
            }
        }

        // Save form values
        function saveFormState() {
            const state = {};
            inputFields.forEach(fieldId => {
                const element = document.getElementById(fieldId);
                if (element) {
                    state[fieldId] = element.value;
                }
            });
            localStorage.setItem(FORM_STORAGE_KEY, JSON.stringify(state));
        }

        // Add input listeners to save on change
        inputFields.forEach(fieldId => {
            const element = document.getElementById(fieldId);
            if (element) {
                element.addEventListener('input', saveFormState);
            }
        });

        // Load saved form state on page load
        loadFormState();

        // Event listeners pre clear button a pull-to-refresh
        document.getElementById('clearButton').addEventListener('click', clearForm);

        let touchStartY = 0;
        let pullIndicator = document.querySelector('.pull-indicator');
        
        document.addEventListener('touchstart', function(e) {
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        document.addEventListener('touchmove', function(e) {
            const touchY = e.touches[0].clientY;
            const pull = touchY - touchStartY;
            
            if (window.scrollY === 0 && pull > 0) {
                pullIndicator.style.transform = `translateY(${Math.min(pull / 2, 50)}px)`;
                e.preventDefault();
            }
        }, { passive: false });

        document.addEventListener('touchend', function(e) {
            const pull = e.changedTouches[0].clientY - touchStartY;
            
            if (pull > 200) {
                clearForm();
            }
            
            pullIndicator.style.transform = 'translateY(-100%)';
        }, { passive: true });

        // Inicializácia
        elements.requiredUpliftLbs.value = '';
        elements.requiredUpliftConverted.value = '';
        elements.fuelTemperature.value = '15';
        elements.fuelDensity.value = '0.7900';
        updateCalculations();

        // Funkcia pre kontrolu PWA statusu - spustí sa na klik
        window.checkPWAStatus = async function() {
            const statusContent = document.getElementById('statusContent');
            const statusBox = document.getElementById('statusBox');

            try {
                statusContent.innerHTML = '<p>⏳ Checking...</p>';
                statusBox.classList.add('show');

                let statusHTML = '';

                // Check Service Worker
                if ('serviceWorker' in navigator) {
                    const registration = await navigator.serviceWorker.getRegistration('/fuel-pwa/');
                    if (registration) {
                        statusHTML += '<p><span class="status-ok">✅ Service Worker: REGISTERED</span></p>';
                    } else {
                        statusHTML += '<p><span class="status-error">❌ Service Worker: NOT REGISTERED</span></p>';
                    }
                } else {
                    statusHTML += '<p><span class="status-error">❌ Service Worker: NOT SUPPORTED</span></p>';
                }

                // Check Persistent Storage
                if (navigator.storage && navigator.storage.persist) {
                    const isPersisted = await navigator.storage.persist();

                    if (isPersisted) {
                        statusHTML += '<p><span class="status-ok">✅ Persistent Storage: GRANTED</span></p>';
                    } else {
                        statusHTML += '<p><span class="status-error">❌ Persistent Storage: DENIED</span></p>';
                    }

                    // Storage info
                    if (navigator.storage.estimate) {
                        const estimate = await navigator.storage.estimate();
                        const usedMB = (estimate.usage / (1024 * 1024)).toFixed(2);
                        const quotaMB = (estimate.quota / (1024 * 1024)).toFixed(2);
                        statusHTML += `<p>💾 Storage: ${usedMB} MB / ${quotaMB} MB</p>`;
                    }
                } else {
                    statusHTML += '<p><span class="status-error">⚠️ Persistent Storage: NOT SUPPORTED</span></p>';
                }

                // Timestamp
                const now = new Date();
                const timestamp = now.toLocaleTimeString('sk-SK');
                statusHTML += `<p style="color: #999; font-size: 12px; margin-top: 15px;">Checked: ${timestamp}</p>`;

                statusContent.innerHTML = statusHTML;

            } catch (error) {
                // XSS Safe: Using textContent instead of innerHTML
                const errorParagraph = document.createElement('p');
                const errorSpan = document.createElement('span');
                errorSpan.className = 'status-error';
                errorSpan.textContent = '❌ Error: ' + error.message;
                errorParagraph.appendChild(errorSpan);
                statusContent.innerHTML = '';
                statusContent.appendChild(errorParagraph);
            }
        };

        // Attach event listeners (replace inline onclick)
        document.getElementById('versionInfo').addEventListener('click', checkPWAStatus);
        document.getElementById('statusBoxCloseBtn').addEventListener('click', function() {
            document.getElementById('statusBox').classList.remove('show');
        });

        // Registrácia Service Workera
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/fuel-pwa/sw.js', {
                scope: '/fuel-pwa/'
            })
            .then(registration => {
                console.log('✅ Service Worker registrovaný');

                // Request Persistent Storage
                if (navigator.storage && navigator.storage.persist) {
                    navigator.storage.persist().then(isPersisted => {
                        console.log(`📦 Persistent Storage: ${isPersisted ? 'GRANTED ✅' : 'DENIED ❌'}`);
                    });
                }
            })
            .catch(error => {
                console.error('❌ Service Worker registrácia zlyhala:', error);
            });
        }
    };
    </script>
</body>
</html>
