<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jet A-1 Uplift Calculator</title>

    <!-- iOS meta tagy -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="fuel PWA">

    <!-- iOS ikony -->
    <link rel="apple-touch-icon" href="/fuel-pwa/assets/icon-180x180.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/fuel-pwa/assets/icon-152x152.png">
    <link rel="apple-touch-icon" sizes="167x167" href="/fuel-pwa/assets/icon-167x167.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/fuel-pwa/assets/icon-180x180.png">
  
    <link rel="manifest" href="/fuel-pwa/manifest.json">
    
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 100%;
            margin: 0 auto;
            padding: 10px;
            box-sizing: border-box;
            overscroll-behavior-y: contain;
            overflow-x: hidden;
        }
        
        .container {
            display: flex;
            width: 300vw;
            transition: transform 0.3s ease;
        }
        
        .page {
            width: 100vw;
            flex-shrink: 0;
            padding: 10px;
            box-sizing: border-box;
        }
        
        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: bold;
            margin-bottom: 5px;
        }
        .input-container {
            display: flex;
            align-items: center;
            flex-wrap: nowrap;
            gap: 5px;
        }
        input, select {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        input {
            flex: 1;
            min-width: 0;
        }
        select {
            width: auto;
            min-width: 80px;
        }
        .unit {
            color: #0066cc;
            min-width: 45px;
            margin-right: 5px;
        }
        #requiredUpliftGroup {
            background-color: #ffe4d1;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
        }
        #requiredUpliftGroup .input-container {
            margin-top: 5px;
            display: grid;
            grid-template-columns: 1fr auto 1fr auto;
            gap: 5px;
            align-items: center;
        }
        
        /* Štýly pre novú stránku */
        #requiredFuelGroup90 {
            background-color: #e4f1ff;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        /* Štýly pre checklist */
        .checklist-item {
            display: flex;
            align-items: center;
            margin-bottom: 0;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            user-select: none;
        }

        .checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid #FF8C00;
            border-radius: 4px;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .checklist-item.checked .checkbox {
            background-color: #4CAF50;
            border-color: #4CAF50;
        }

        .checkbox::after {
            content: '✓';
            color: white;
            font-size: 18px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .checklist-item.checked .checkbox::after {
            opacity: 1;
        }

        .checklist-item label {
            color: #FF8C00;
            font-weight: 650;
            font-size: 23px;
            margin-bottom: 0;
            cursor: pointer;
            transition: color 0.3s ease;
            flex: 1;
        }

        .checklist-item.checked label {
            color: #4CAF50;
        }
        
        h1 {
            font-size: 1.5em;
            margin-bottom: 20px;
        }
        @media (min-width: 600px) {
            body {
                padding: 20px;
            }
            .page {
                max-width: 600px;
                margin: 0 auto;
            }
            .form-group {
                flex-direction: row;
                align-items: center;
            }
            label {
                flex: 0 0 200px;
                margin-bottom: 0;
            }
            .input-container {
                flex: 1;
            }
        }
        .clear-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #35c94e;
            color: white;
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 1000;
            cursor: pointer;
        }
        
        /* Page indicator */
        .page-indicator {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 1000;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #ccc;
            transition: background-color 0.3s;
        }
        .dot.active {
            background-color: #0066cc;
        }
        
        /* Štýly pre pull-to-refresh */
        .pull-indicator {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f0f0f0;
            transform: translateY(-100%);
            transition: transform 0.2s;
        }
    </style>
</head>
<body>
    <div class="pull-indicator">Pull to refresh</div>
    
    <div class="container" id="container">
        <!-- Prvá stránka - pôvodný calculator -->
        <div class="page" id="page1">
            <h1>Jet A-1 Uplift Calculator</h1>
            <div id="calculator">
                <div class="form-group">
                    <label for="remainingFuel">Remaining Fuel:</label>
                    <div class="input-container">
                        <input type="number" id="remainingFuel">
                        <span class="unit">lbs</span>
                    </div>
                </div>
                <div class="form-group">
                    <label for="requiredFuel">Required Fuel:</label>
                    <div class="input-container">
                        <input type="number" id="requiredFuel">
                        <span class="unit">lbs</span>
                    </div>
                </div>
                <div class="form-group">
                    <label for="fuelDensity">Fuel Density:</label>
                    <div class="input-container">
                        <input type="number" id="fuelDensity" value="0.7900" step="0.0001">
                        <span class="unit">kg/l</span>
                    </div>
                </div>
                <div class="form-group">
                    <label for="fuelTemperature">Fuel Temperature:</label>
                    <div class="input-container">
                        <input type="number" id="fuelTemperature">
                        <span class="unit">°C</span>
                    </div>
                </div>
                <div id="requiredUpliftGroup">
                    <label for="requiredUpliftLbs">Required Uplift:</label>
                    <div class="input-container">
                        <input type="number" id="requiredUpliftLbs">
                        <span class="unit">lbs</span>
                        <input type="number" id="requiredUpliftConverted" readonly>
                        <select id="upliftUnit">
                            <option value="L">liters</option>
                            <option value="USG">USgal</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="actualUplift">Actual Uplift:</label>
                    <div class="input-container">
                        <input type="number" id="actualUplift">
                        <select id="actualUpliftUnit">
                            <option value="L">liters</option>
                            <option value="USG">USgal</option>
                            <option value="LBS">lbs</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="totalActualFuel">Total Actual Fuel:</label>
                    <div class="input-container">
                        <input type="number" id="totalActualFuel" readonly>
                        <span class="unit">lbs</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Druhá stránka - "90%" calculator -->
        <div class="page" id="page2">
            <h1>"90%" Uplift Calculator</h1>
            <div id="calculator90">
                <div class="form-group">
                    <label for="remainingFuel90">Remaining Fuel:</label>
                    <div class="input-container">
                        <input type="number" id="remainingFuel90" maxlength="5">
                        <span class="unit">lbs</span>
                    </div>
                </div>
                <div class="form-group">
                    <label for="tripTaxiFuel">Trip+Taxi Fuel:</label>
                    <div class="input-container">
                        <input type="number" id="tripTaxiFuel" maxlength="5">
                        <span class="unit">lbs</span>
                    </div>
                </div>
                <div id="requiredFuelGroup90">
                    <label for="requiredFuel90">Required Fuel:</label>
                    <div class="input-container">
                        <input type="number" id="requiredFuel90" readonly>
                        <span class="unit">lbs</span>
                    </div>
                </div>
                <div class="form-group">
                    <label for="onBlockFuel">On Block Fuel:</label>
                    <div class="input-container">
                        <input type="number" id="onBlockFuel" readonly>
                        <span class="unit">lbs</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tretia stránka - Parking checklist -->
        <div class="page" id="page3">
            <h1>Parking Checklist</h1>
            <div id="parkingChecklist">
                <div class="checklist-item" data-item="sun-shields">
                    <div class="checkbox"></div>
                    <label>Sun shields</label>
                </div>
                <div class="checklist-item" data-item="chocks">
                    <div class="checkbox"></div>
                    <label>Chocks</label>
                </div>
                <div class="checklist-item" data-item="brake-off">
                    <div class="checkbox"></div>
                    <label>Brake OFF</label>
                </div>
                <div class="checklist-item" data-item="gear-rat-pins">
                    <div class="checkbox"></div>
                    <label>Gear/RAT pins</label>
                </div>
                <div class="checklist-item" data-item="probes-covers">
                    <div class="checkbox"></div>
                    <label>Probes covers</label>
                </div>
                <div class="checklist-item" data-item="nlg-disconnect">
                    <div class="checkbox"></div>
                    <label>NLG disconnect</label>
                </div>
                <div class="checklist-item" data-item="toilet-service">
                    <div class="checkbox"></div>
                    <label>Toilet service</label>
                </div>
                <div class="checklist-item" data-item="water-drain">
                    <div class="checkbox"></div>
                    <label>Water drain</label>
                </div>
                <div class="checklist-item" data-item="fuel-spillage">
                    <div class="checkbox"></div>
                    <label>Fuel spillage</label>
                </div>
                <div class="checklist-item" data-item="engine-apu-covers">
                    <div class="checkbox"></div>
                    <label>Engine/APU covers</label>
                </div>
                <div class="checklist-item" data-item="batteries">
                    <div class="checkbox"></div>
                    <label>Batteries</label>
                </div>
            </div>
        </div>
    </div>

    <!-- Page indicator -->
    <div class="page-indicator">
        <div class="dot active" id="dot1"></div>
        <div class="dot" id="dot2"></div>
        <div class="dot" id="dot3"></div>
    </div>

    <button class="clear-button" id="clearButton">CLR</button>

    <script>
    window.onload = function() {
        const elements = {
            // Prvá stránka
            remainingFuel: document.getElementById('remainingFuel'),
            requiredFuel: document.getElementById('requiredFuel'),
            fuelDensity: document.getElementById('fuelDensity'),
            fuelTemperature: document.getElementById('fuelTemperature'),
            requiredUpliftLbs: document.getElementById('requiredUpliftLbs'),
            requiredUpliftConverted: document.getElementById('requiredUpliftConverted'),
            upliftUnit: document.getElementById('upliftUnit'),
            actualUplift: document.getElementById('actualUplift'),
            actualUpliftUnit: document.getElementById('actualUpliftUnit'),
            totalActualFuel: document.getElementById('totalActualFuel'),
            
            // Druhá stránka
            remainingFuel90: document.getElementById('remainingFuel90'),
            tripTaxiFuel: document.getElementById('tripTaxiFuel'),
            requiredFuel90: document.getElementById('requiredFuel90'),
            onBlockFuel: document.getElementById('onBlockFuel')
        };

        let currentPage = 0;
        let lastActualUpliftLbs = 0;

        const container = document.getElementById('container');
        const dot1 = document.getElementById('dot1');
        const dot2 = document.getElementById('dot2');
        const dot3 = document.getElementById('dot3');

        // Swipe functionality
        let startX = 0;
        let startY = 0;
        let isScrolling = false;

        document.addEventListener('touchstart', function(e) {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
            isScrolling = undefined;
        }, { passive: true });

        document.addEventListener('touchmove', function(e) {
            if (isScrolling === true) return;
            
            const currentX = e.touches[0].clientX;
            const currentY = e.touches[0].clientY;
            const diffX = startX - currentX;
            const diffY = startY - currentY;
            
            if (isScrolling === undefined) {
                isScrolling = Math.abs(diffY) > Math.abs(diffX);
            }
            
            if (!isScrolling && Math.abs(diffX) > 10) {
                e.preventDefault();
            }
        }, { passive: false });

        document.addEventListener('touchend', function(e) {
            if (isScrolling) return;

            const endX = e.changedTouches[0].clientX;
            const diffX = startX - endX;

            if (Math.abs(diffX) > 50) {
                if (diffX > 0) {
                    // Swipe left - ďalšia stránka
                    if (currentPage < 2) {
                        currentPage++;
                        updatePagePosition();
                    }
                } else if (diffX < 0) {
                    // Swipe right - predošlá stránka
                    if (currentPage > 0) {
                        currentPage--;
                        updatePagePosition();
                    }
                }
            }
        }, { passive: true });

        function updatePagePosition() {
            container.style.transform = `translateX(-${currentPage * 100}vw)`;
            dot1.classList.toggle('active', currentPage === 0);
            dot2.classList.toggle('active', currentPage === 1);
            dot3.classList.toggle('active', currentPage === 2);
        }

        // Funkcie pre 90% calculator
        function calculate90Percent() {
            const remainingFuel90 = parseFloat(elements.remainingFuel90.value) || 0;
            const tripTaxiFuel = parseFloat(elements.tripTaxiFuel.value) || 0;
            
            // Required Fuel = Remaining Fuel + 90% of Trip+Taxi Fuel
            const requiredFuel90 = remainingFuel90 + (tripTaxiFuel * 0.9);
            elements.requiredFuel90.value = Math.round(requiredFuel90);
            
            // On Block Fuel = Required Fuel - Trip+Taxi Fuel
            const onBlockFuel = requiredFuel90 - tripTaxiFuel;
            elements.onBlockFuel.value = Math.round(onBlockFuel);
        }

        // Event listeners pre 90% calculator
        elements.tripTaxiFuel.addEventListener('input', calculate90Percent);

        // Synchronizácia iba medzi Remaining Fuel poliami
        elements.remainingFuel.addEventListener('input', function() {
            elements.remainingFuel90.value = this.value;
            updateCalculations();
        });

        elements.remainingFuel90.addEventListener('input', function() {
            elements.remainingFuel.value = this.value;
            calculate90Percent();
            updateCalculations();
        });

        // Funkcia na vymazanie formulára
        function clearForm() {
            // Prvá stránka
            elements.remainingFuel.value = '';
            elements.requiredFuel.value = '';
            elements.fuelDensity.value = '0.7900';
            elements.fuelTemperature.value = '15';
            elements.requiredUpliftLbs.value = '';
            elements.requiredUpliftConverted.value = '';
            elements.actualUplift.value = '';
            elements.totalActualFuel.value = '';

            // Druhá stránka
            elements.remainingFuel90.value = '';
            elements.tripTaxiFuel.value = '';
            elements.requiredFuel90.value = '';
            elements.onBlockFuel.value = '';

            // Resetovanie checklistu
            const checklistItems = document.querySelectorAll('.checklist-item');
            checklistItems.forEach(item => {
                item.classList.remove('checked');
            });
            localStorage.removeItem('parkingChecklistState');

            lastActualUpliftLbs = 0;
            updateCalculations();
        }

        // Offline event listenery
        window.addEventListener('offline', function() {
            console.log('Aplikácia je offline');
        });

        window.addEventListener('online', function() {
            console.log('Aplikácia je online');
            if (navigator.serviceWorker.controller) {
                navigator.serviceWorker.controller.postMessage({
                    type: 'UPDATE_CACHE'
                });
            }
        });

        function calculateDensity(temperature) {
            return 0.79 + (15 - temperature) * 0.0007;
        }

        function calculateTemperature(density) {
            return 15 + ((0.79 - density) / 0.0007);
        }

        function convertToLiters(value, fromUnit) {
            if (fromUnit === 'USG') return value * 3.78541;
            if (fromUnit === 'LBS') {
                const density = parseFloat(elements.fuelDensity.value) || 0.79;
                return value / (density * 2.20462);
            }
            return value;
        }

        function convertFromLiters(liters, toUnit) {
            if (toUnit === 'USG') return liters / 3.78541;
            if (toUnit === 'LBS') {
                const density = parseFloat(elements.fuelDensity.value) || 0.79;
                return liters * density * 2.20462;
            }
            return liters;
        }

        function convertValue(value, fromUnit, toUnit) {
            if (fromUnit === toUnit) return value;
            const liters = convertToLiters(value, fromUnit);
            return convertFromLiters(liters, toUnit);
        }

        function updateActualUpliftDisplay() {
            const currentUnit = elements.actualUpliftUnit.value;
            const currentValue = parseFloat(elements.actualUplift.value) || 0;
            const currentValueInLbs = convertValue(currentValue, currentUnit, 'LBS');
            lastActualUpliftLbs = currentValueInLbs;
        }

        function convertActualUpliftToNewUnit(newUnit) {
            if (!elements.actualUplift.value) return;
            const newValue = convertValue(lastActualUpliftLbs, 'LBS', newUnit);
            elements.actualUplift.value = Math.round(newValue);
        }

        function updateCalculations() {
            const density = parseFloat(elements.fuelDensity.value) || 0.79;
            const remainingFuelLbs = parseFloat(elements.remainingFuel.value) || 0;
            const requiredFuelLbs = parseFloat(elements.requiredFuel.value) || 0;
            let upliftLbs = parseFloat(elements.requiredUpliftLbs.value) || 0;

            if (remainingFuelLbs && requiredFuelLbs) {
                upliftLbs = requiredFuelLbs - remainingFuelLbs;
                elements.requiredUpliftLbs.value = Math.round(upliftLbs);
            } else if (upliftLbs) {
                elements.requiredFuel.value = Math.round(remainingFuelLbs + upliftLbs);
            }

            elements.requiredUpliftConverted.value = Math.round(
                convertValue(upliftLbs, 'LBS', elements.upliftUnit.value)
            );

            elements.totalActualFuel.value = Math.round((remainingFuelLbs + lastActualUpliftLbs) / 10) * 10;
        }

        // Event listeners pre existujúce funkcie
        elements.actualUplift.addEventListener('input', function() {
            updateActualUpliftDisplay();
            updateCalculations();
        });

        // Pridané event listenery pre Required Fuel a Required Uplift
        ['requiredFuel', 'requiredUpliftLbs'].forEach(id => {
            elements[id].addEventListener('input', updateCalculations);
        });

        elements.actualUpliftUnit.addEventListener('change', function() {
            convertActualUpliftToNewUnit(this.value);
            updateCalculations();
        });

        elements.upliftUnit.addEventListener('change', function() {
            const selectedUnit = this.value;
            if (selectedUnit === 'USG') {
                if (elements.actualUpliftUnit.value !== 'LBS') {
                    elements.actualUpliftUnit.value = 'USG';
                    convertActualUpliftToNewUnit('USG');
                }
            }
            updateCalculations();
        });

        elements.fuelDensity.addEventListener('input', function() {
            const density = parseFloat(this.value);
            if (!isNaN(density)) {
                elements.fuelTemperature.value = Math.round(calculateTemperature(density));
            }
            if (elements.actualUplift.value) {
                updateActualUpliftDisplay();
                convertActualUpliftToNewUnit(elements.actualUpliftUnit.value);
            }
            updateCalculations();
        });

        elements.fuelTemperature.addEventListener('input', function() {
            const temperature = parseFloat(this.value);
            if (!isNaN(temperature)) {
                elements.fuelDensity.value = calculateDensity(temperature).toFixed(4);
            }
            if (elements.actualUplift.value) {
                updateActualUpliftDisplay();
                convertActualUpliftToNewUnit(elements.actualUpliftUnit.value);
            }
            updateCalculations();
        });

        // Parking checklist functionality
        const checklistItems = document.querySelectorAll('.checklist-item');
        const CHECKLIST_STORAGE_KEY = 'parkingChecklistState';

        // Načítanie stavu checklistu z localStorage
        function loadChecklistState() {
            const savedState = localStorage.getItem(CHECKLIST_STORAGE_KEY);
            if (savedState) {
                const state = JSON.parse(savedState);
                checklistItems.forEach(item => {
                    const itemKey = item.getAttribute('data-item');
                    if (state[itemKey]) {
                        item.classList.add('checked');
                    }
                });
            }
        }

        // Uloženie stavu checklistu do localStorage
        function saveChecklistState() {
            const state = {};
            checklistItems.forEach(item => {
                const itemKey = item.getAttribute('data-item');
                state[itemKey] = item.classList.contains('checked');
            });
            localStorage.setItem(CHECKLIST_STORAGE_KEY, JSON.stringify(state));
        }

        // Toggle checkbox
        checklistItems.forEach(item => {
            item.addEventListener('click', function() {
                this.classList.toggle('checked');
                saveChecklistState();
            });
        });

        // Načítanie uloženého stavu pri načítaní stránky
        loadChecklistState();

        // Event listeners pre clear button a pull-to-refresh
        document.getElementById('clearButton').addEventListener('click', clearForm);

        let touchStartY = 0;
        let pullIndicator = document.querySelector('.pull-indicator');
        
        document.addEventListener('touchstart', function(e) {
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        document.addEventListener('touchmove', function(e) {
            const touchY = e.touches[0].clientY;
            const pull = touchY - touchStartY;
            
            if (window.scrollY === 0 && pull > 0) {
                pullIndicator.style.transform = `translateY(${Math.min(pull / 2, 50)}px)`;
                e.preventDefault();
            }
        }, { passive: false });

        document.addEventListener('touchend', function(e) {
            const pull = e.changedTouches[0].clientY - touchStartY;
            
            if (pull > 200) {
                clearForm();
            }
            
            pullIndicator.style.transform = 'translateY(-100%)';
        }, { passive: true });

        // Inicializácia
        elements.requiredUpliftLbs.value = '';
        elements.requiredUpliftConverted.value = '';
        elements.fuelTemperature.value = '15';
        elements.fuelDensity.value = '0.7900';
        updateCalculations();

        // Registrácia Service Workera
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', async () => {
                try {
                    const registration = await navigator.serviceWorker.register('/fuel-pwa/sw.js', {
                        scope: '/fuel-pwa/'
                    });
                    console.log('Service Worker registrovaný');

                    // Kontrola aktualizácií pri štarte
                    const checkForUpdates = async () => {
                        try {
                            await registration.update();
                            console.log('Service Worker aktualizovaný');
                        } catch (error) {
                            console.error('Chyba pri aktualizácii Service Workera:', error);
                        }
                    };

                    // Kontrola aktualizácií každých 6 hodín (menej agresívne)
                    setInterval(checkForUpdates, 1000 * 60 * 60 * 6);

                    // Kontrola pri obnovení pripojenia
                    window.addEventListener('online', checkForUpdates);

                } catch (error) {
                    console.error('Service Worker registrácia zlyhala:', error);
                }
            });

            // Vylepšené sledovanie životného cyklu aplikácie
            let lastUpdateCheck = Date.now();

            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible') {
                    const timeSinceLastUpdate = Date.now() - lastUpdateCheck;
                    if (timeSinceLastUpdate > 1000 * 60 * 60 * 6) { // 6 hodín
                        if (navigator.serviceWorker.controller && navigator.onLine) {
                            navigator.serviceWorker.controller.postMessage({
                                type: 'UPDATE_CACHE'
                            });
                            lastUpdateCheck = Date.now();
                        }
                    }
                }
            });
        }
    };
    </script>
</body>
</html>
